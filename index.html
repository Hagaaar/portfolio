<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Portfolio Planning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0b;
  --surface: #141413;
  --surface2: #1c1c1a;
  --border: #242422;
  --border2: #303030;
  --text: #f5f0e8;
  --text2: #bdb8b0;
  --text3: #8a8680;
  --setup:    #6b7280; --setup-bg:    #191b1f;
  --reformat: #4ade80; --reformat-bg: #0c1a10;
  --nouveau:  #60a5fa; --nouveau-bg:  #0c1422;
  --finitions:#fbbf24; --finitions-bg:#1e1a0c;
  --conges:   #3a3a38; --conges-bg:   #111110;
  --vol1: #c084fc; --vol1-bg: #1a0f2a;
  --vol2: #34d399; --vol2-bg: #0a1f18;
  --vol3: #fb923c; --vol3-bg: #211508;
  --accent: #e8d5a3;
  --r: 5px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg); color: var(--text);
  font-family: 'Roboto', -apple-system, sans-serif;
  font-size: 15px; line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════ HEADER ═══════════════════ */
#header {
  position: sticky; top: 0; z-index: 200;
  background: var(--bg);
  padding-top: var(--safe-top);
  border-bottom: 1px solid var(--border);
}

.hdr-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px 8px;
}
.hdr-title {
  font-family: 'Roboto', sans-serif;
  font-size: 22px; font-weight: 700; letter-spacing: -.01em;
  color: var(--text);
}
.hdr-sync {
  display: flex; align-items: center; gap: 6px;
}
.sync-label {
  font-family: 'Roboto Mono', monospace; font-size: 10px;
  color: var(--text3); letter-spacing: .04em;
}

.hdr-tabs {
  display: flex; width: 100%;
  border-bottom: 1px solid var(--border);
  margin-top: 8px;
}
.hdr-tab {
  flex: 1; text-align: center;
  padding: 9px 4px; cursor: pointer;
  font-family: 'Roboto Mono', monospace;
  font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text3); border: none; background: none;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
  -webkit-appearance: none;
}
.hdr-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.hdr-progress {
  padding: 10px 16px 14px;
  display: flex; flex-direction: column; gap: 12px;
}
.hdr-prog-row {
  display: flex; align-items: center; gap: 8px;
}
.hdr-prog-lbl {
  font-family: 'Roboto Mono', monospace; font-size: 18px;
  color: var(--text2); letter-spacing: .04em; text-transform: uppercase;
  width: 80px; flex-shrink: 0; font-weight: 300;
}
.hdr-prog-bar {
  flex: 1; height: 15px; background: var(--border2);
  border-radius: 4px; overflow: hidden; min-width: 0;
}
.hdr-prog-bar-pages { }
.hdr-prog-fill {
  height: 100%; background: var(--reformat); border-radius: 4px;
  transition: width .4s ease;
}
.hdr-prog-fill-pages {
  background: var(--vol2);
}
.hdr-prog-label {
  font-family: 'Roboto Mono', monospace; font-size: 13px;
  color: var(--text2); white-space: nowrap; letter-spacing: .02em;
  width: 72px; text-align: right; font-weight: 300; flex-shrink: 0;
}
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text3); flex-shrink: 0;
  transition: background .4s;
}
.sync-dot.ok      { background: var(--reformat); }
.sync-dot.syncing { background: var(--finitions); animation: pulse .8s infinite; }
.sync-dot.offline { background: #f87171; }
@keyframes pulse {
  0%,100% { opacity:1; } 50% { opacity:.4; }
}

/* ═══════════════════ TAB PAGES ═══════════════════ */
.tab-page { display: none; }
.tab-page.active { display: block; }

/* ═══════════════════ PLANNING ═══════════════════ */
#page-planning { padding: 8px 8px 80px; }

/* Congés */
.conges-row {
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--conges-bg);
  padding: 10px 12px;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px;
  opacity: .6;
}
.conges-row .ci { font-size: 16px; }
.conges-row .cl {
  font-family: 'Roboto Mono', monospace; font-size: 10px;
  color: var(--conges); letter-spacing: .1em; text-transform: uppercase;
}
.conges-row .cd { font-size: 13px; color: var(--text); }

/* Week card */
.wk {
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--surface);
  margin-bottom: 6px;
  overflow: hidden; transition: border-color .2s;
}
.wk.current { border-color: var(--accent)88; }
.wk.done-all { opacity: .5; }

/* Week header tap area */
.wk-head {
  padding: 10px 12px;
  cursor: pointer; user-select: none;
  display: flex; align-items: flex-start;
  gap: 8px; min-height: 44px;
}
.wk-head:active { background: var(--surface2); }

.wk-left { flex: 1; min-width: 0; }

.wk-badges {
  display: flex; flex-wrap: wrap; gap: 4px;
  margin-bottom: 5px; align-items: center;
}
.badge {
  font-family: 'Roboto Mono', monospace;
  font-size: 9px; letter-spacing: .08em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 3px; border: 1px solid;
  line-height: 1.4;
}
.b-setup    { color: var(--setup);    background: var(--setup-bg);    border-color: var(--setup)55; }
.b-reformat { color: var(--reformat); background: var(--reformat-bg); border-color: var(--reformat)55; }
.b-nouveau  { color: var(--nouveau);  background: var(--nouveau-bg);  border-color: var(--nouveau)55; }
.b-finitions{ color: var(--finitions);background: var(--finitions-bg);border-color: var(--finitions)55; }
.b-vol1     { color: var(--vol1);     background: var(--vol1-bg);     border-color: var(--vol1)55; }
.b-vol2     { color: var(--vol2);     background: var(--vol2-bg);     border-color: var(--vol2)55; }
.b-vol3     { color: var(--vol3);     background: var(--vol3-bg);     border-color: var(--vol3)55; }
.b-week     { color: var(--text3);    background: transparent;        border-color: var(--border2); }

.wk-title {
  font-size: 16px; font-weight: 600; color: var(--text);
  line-height: 1.3; margin-bottom: 2px;
}
.wk-sub {
  font-size: 13px; color: var(--text); line-height: 1.4;
}

.wk-right {
  flex-shrink: 0; display: flex; flex-direction: column;
  align-items: flex-end; gap: 4px; padding-top: 1px;
}
.wk-pages {
  font-family: 'Roboto Mono', monospace; font-size: 11px; color: var(--text2);
}
.wk-prog-wrap { display: flex; align-items: center; gap: 5px; }
.wk-prog-bar {
  width: 48px; height: 2px; background: var(--border2);
  border-radius: 1px; overflow: hidden;
}
.wk-prog-fill { height: 100%; border-radius: 1px; transition: width .3s; }
.reformat .wk-prog-fill { background: var(--reformat); }
.nouveau  .wk-prog-fill { background: var(--nouveau); }
.setup    .wk-prog-fill { background: var(--setup); }
.finitions .wk-prog-fill { background: var(--finitions); }
.wk-prog-pct {
  font-family: 'Roboto Mono', monospace; font-size: 9px;
  color: var(--text2); width: 26px; text-align: right;
}
.chev {
  font-size: 10px; color: var(--text3);
  transition: transform .2s; margin-top: 2px;
}
.wk.open .chev { transform: rotate(180deg); }

/* Tasks panel */
.wk-tasks {
  display: none; border-top: 1px solid var(--border);
  padding: 0 0 8px;
}
.wk.open .wk-tasks { display: block; }

.tasks-header {
  padding: 8px 12px 6px;
  font-family: 'Roboto Mono', monospace; font-size: 9px;
  color: var(--text3); letter-spacing: .1em; text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}

.task {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  min-height: 44px; transition: opacity .2s;
}
.task:last-of-type { border-bottom: none; }
.task.done { opacity: 1; background: #0d2016; }

.task-cb {
  width: 20px; height: 20px; flex-shrink: 0;
  border: 1px solid var(--border2);
  border-radius: 4px; margin-top: 1px;
  cursor: pointer; -webkit-appearance: none; appearance: none;
  background: var(--surface);
  position: relative; transition: all .15s;
}
.task-cb:checked {
  background: var(--reformat); border-color: var(--reformat);
}

.task-txt {
  font-size: 15px; color: var(--text); line-height: 1.55; flex: 1;
}
.task-pages-badge {
  font-family: 'Roboto Mono', monospace; font-size: 12px; font-weight: 500;
  color: var(--text2);
  white-space: nowrap; flex-shrink: 0; align-self: center;
  letter-spacing: .04em; padding-left: 8px;
}
.task.done .task-txt { text-decoration: line-through; color: var(--text3); }

.wk-note {
  margin: 4px 12px 0;
  padding: 8px 10px;
  border-radius: var(--r);
  background: var(--surface2);
  border-left: 2px solid var(--border2);
  font-size: 13px; color: var(--text); line-height: 1.6;
}
.wk-note.warn { border-left-color: var(--finitions); }
.wk-note.ok   { border-left-color: var(--reformat); }

/* ═══════════════════ VOLUMES ═══════════════════ */
#page-volumes { padding: 8px 8px 80px; }

.vol-cards {
  display: flex; flex-direction: column; gap: 6px;
  margin-bottom: 12px;
}
.vol-card {
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surface); padding: 12px;
}
.vc-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.vc-lbl { font-family: 'Roboto Mono', monospace; font-size: 9px; letter-spacing: .12em; text-transform: uppercase; }
.v1 .vc-lbl { color: var(--vol1); }
.v2 .vc-lbl { color: var(--vol2); }
.v3 .vc-lbl { color: var(--vol3); }
.vc-title { font-size: 17px; font-weight: 300; font-style: italic; }
.vc-bar-track { height: 5px; background: var(--border2); border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
.vc-bar-fill { height: 100%; border-radius: 3px; transition: width .5s; }
.v1 .vc-bar-fill { background: var(--vol1); }
.v2 .vc-bar-fill { background: var(--vol2); }
.v3 .vc-bar-fill { background: var(--vol3); }
.vc-nums {
  display: flex; justify-content: space-between;
  font-family: 'Roboto Mono', monospace; font-size: 10px; color: var(--text3);
}
.vc-nums .big { font-size: 15px; color: var(--text); }
.vc-marge { font-family: 'Roboto Mono', monospace; font-size: 9px; color: var(--text3); margin-top: 4px; }
.vc-marge span { color: var(--reformat); }

.vol-detail {
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surface); margin-bottom: 8px; overflow: hidden;
}
.vd-hdr {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.vd-hdr-l { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; }
.vd-total { font-family: 'Roboto Mono', monospace; font-size: 11px; color: var(--text2); }

.sec-head {
  padding: 7px 12px;
  background: var(--surface2); border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'Roboto Mono', monospace; font-size: 9px;
  color: var(--text); letter-spacing: .08em; text-transform: uppercase;
}

.proj-row {
  padding: 7px 12px 7px 20px;
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid var(--border);
  font-size: 14px;
}
.proj-right { display: flex; gap: 8px; align-items: center; }
.proj-sem { font-family: 'Roboto Mono', monospace; font-size: 10px; color: var(--text2); }
.proj-p   { font-family: 'Roboto Mono', monospace; font-size: 12px; color: var(--text); }

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ═══════════════════ SETUP BANNER ═══════════════════ */
#setup-banner {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
  background: var(--surface2); border-top: 1px solid var(--border);
  padding: 10px 12px calc(10px + var(--safe-bot));
  font-size: 13px; color: var(--text); line-height: 1.6;
}
#setup-banner h4 { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
#setup-banner code { font-family: 'Roboto Mono', monospace; font-size: 10px; color: var(--text); background: var(--bg); padding: 1px 4px; border-radius: 3px; }
#setup-banner input {
  width: 100%; margin-top: 6px; padding: 8px 10px;
  background: var(--bg); border: 1px solid var(--border2);
  border-radius: var(--r); color: var(--text);
  font-family: 'Roboto Mono', monospace; font-size: 12px;
  -webkit-appearance: none;
}
#setup-banner button {
  margin-top: 6px; width: 100%; padding: 10px;
  background: var(--accent); color: var(--bg); font-weight: 700;
  border: none; border-radius: var(--r); font-size: 14px;
  cursor: pointer; -webkit-appearance: none;
}
#setup-dismiss {
  position: absolute; top: 10px; right: 12px;
  font-size: 20px; color: var(--text3); cursor: pointer; line-height: 1;
}
</style>
</head>

const LS_KEY = 'portfolio_v7_state';
let state = {};

function loadLocal() {
  try { const r = localStorage.getItem(LS_KEY); return r ? JSON.parse(r) : {}; }
  catch(e) { return {}; }
}

function saveLocal() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {}
}

function setSyncDot(status) {
  const d = document.getElementById('syncDot');
  const l = document.getElementById('syncLabel');
  if (!d) return;
  const map = {
    ok:      { cls:'ok',      label:'Synchronisé' },
    syncing: { cls:'syncing', label:'Sync...' },
    error:   { cls:'offline', label:'Hors ligne' },
    offline: { cls:'offline', label:'Hors ligne' },
    local:   { cls:'',        label:'Local' },
    idle:    { cls:'',        label:'Local' },
  };
  const s = map[status] || map.idle;
  d.className = 'sync-dot' + (s.cls ? ' ' + s.cls : '');
  if (l) l.textContent = s.label;
}

async function loadFromGS() {
  if (!GS_URL) return false;
  try {
    setSyncDot('syncing');
    // Use a script tag injection (JSONP-style) to avoid CORS on file:// protocol
    const url = GS_URL + '?action=get&cb=_gsCallback&t=' + Date.now();
    const data = await new Promise((resolve, reject) => {
      const timeout = setTimeout(() => reject(new Error('timeout')), 8000);
      window._gsCallback = (d) => { clearTimeout(timeout); resolve(d); };
      const s = document.createElement('script');
      s.src = url; s.onerror = () => { clearTimeout(timeout); reject(new Error('load')); };
      document.head.appendChild(s);
      setTimeout(() => document.head.removeChild(s), 9000);
    });
    state = { ...state, ...data };
    saveLocal();
    setSyncDot('ok');
    return true;
  } catch(e) {
    console.warn('GS load skipped (local file mode):', e.message);
    setSyncDot('local');
    return false;
  }
}

let syncTimer = null;
async function syncToGS() {
  if (!GS_URL) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(async () => {
    try {
      setSyncDot('syncing');
      // Use no-cors to avoid CORS preflight issues with Apps Script
      // Data sent as plain text in body, Apps Script reads e.postData.contents
      await fetch(GS_URL + '?action=set', {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(state)
      });
      // With no-cors we can't read the response, but if no exception = sent OK
      setSyncDot('ok');
    } catch(e) {
      console.warn('GS sync error:', e);
      setSyncDot('offline');
    }
  }, 1000);
}

function isDone(id) { return !!state[id]; }
function setDone(id, v) {
  state[id] = v;
  saveLocal();
  syncToGS();
}

// ══════════════════════════════════════════════════════════════════
// RENDER PLANNING
// ══════════════════════════════════════════════════════════════════
function findCurrentWeek() {
  for (const e of PLANNING) {
    if (e.type === 'conges') continue;
    const done = e.tasks.filter(t => isDone(t.id)).length;
    if (done < e.tasks.length) return e.id;
  }
  return null;
}

function taskCleanText(txt) {
  return txt.replace(/\s*\(\d+p\)/gi, '').trim();
}
function taskPageBadge(txt) {
  const m = txt.match(/\((\d+)p\)/i);
  return m ? '<span class="task-pages-badge">' + m[1] + ' p</span>' : '';
}

function renderPlanning() {
  const currentId = findCurrentWeek();
  let h = '';
  PLANNING.forEach(e => {
    if (e.type === 'conges') {
      h += `<div class="conges-row"><span class="ci">✈️</span><div><div class="cl">Congés — hors planning</div><div class="cd">${e.dates} · ${e.lbl}</div></div></div>`;
      return;
    }
    const total = e.tasks.length;
    const done = e.tasks.filter(t => isDone(t.id)).length;
    const pct = total ? Math.round(done/total*100) : 0;
    const isCur = e.id === currentId;
    const isAll = done === total;
    const openClass = '';
    h += `<div class="wk ${e.type}${isAll?' done-all':''}${isCur?' current':''} ${openClass}" id="wk-${e.id}">
      <div class="wk-head" onclick="toggleWk('${e.id}')">
        <div class="wk-left">
          <div class="wk-badges">
            <span class="badge b-week">${e.week}</span>
            <span class="badge b-${e.type}">${e.type.toUpperCase()}</span>
            ${e.vol ? `<span class="badge ${e.vol}">${e.volLbl}</span>` : ''}
          </div>
          <div class="wk-title">${e.title}</div>
          <div class="wk-sub">${e.dates} · ${e.section}</div>
        </div>
        <div class="wk-right">
          ${e.pages ? `<span class="wk-pages">${e.pages}</span>` : ''}
          <div class="wk-prog-wrap">
            <div class="wk-prog-bar"><div class="wk-prog-fill" id="wpf-${e.id}" style="width:${pct}%"></div></div>
            <span class="wk-prog-pct" id="wpp-${e.id}">${pct}%</span>
          </div>
          <span class="chev">▾</span>
        </div>
      </div>
      <div class="wk-tasks" id="wkt-${e.id}">
        <div class="tasks-header" id="th-${e.id}">Tâches · ${done}/${total}</div>
        ${e.tasks.map(t => `
          <div class="task${isDone(t.id)?' done':''}" id="tr-${t.id}">
            <input type="checkbox" class="task-cb" id="cb-${t.id}" ${isDone(t.id)?'checked':''}
              onchange="toggleTask('${t.id}','${e.id}',this.checked)">
            <span class="task-txt">${taskCleanText(t.txt)}</span>
            ${taskPageBadge(t.txt)}
          </div>`).join('')}
        ${e.note ? `<div class="wk-note${e.note.cls?' '+e.note.cls:''}">${e.note.txt}</div>` : ''}
      </div>
    </div>`;
  });
  document.getElementById('planCont').innerHTML = h;
}

// ══════════════════════════════════════════════════════════════════
// RENDER VOLUMES
// ══════════════════════════════════════════════════════════════════
function renderVolumes() {
  let h = '<div class="vol-cards">';
  VOLUMES.forEach(v => {
    const pct = Math.round(v.pages/v.limit*100);
    h += `<div class="vol-card ${v.cls}">
      <div class="vc-top"><span class="vc-lbl">${v.lbl}</span><span class="vc-title">${v.title}</span></div>
      <div class="vc-bar-track"><div class="vc-bar-fill" style="width:${pct}%"></div></div>
      <div class="vc-nums"><span class="big">${v.pages}p</span><span>/ ${v.limit}p max</span></div>
      <div class="vc-marge">Marge : <span>+${v.marge}p disponibles</span></div>
    </div>`;
  });
  h += '</div>';
  VOLUMES.forEach(v => {
    h += `<div class="vol-detail">
      <div class="vd-hdr">
        <div class="vd-hdr-l"><span class="badge ${v.cls==='v1'?'b-vol1':v.cls==='v2'?'b-vol2':'b-vol3'}">${v.lbl}</span>${v.title}</div>
        <span class="vd-total">${v.pages}p / ${v.limit}p</span>
      </div>`;
    v.sections.forEach(sec => {
      h += `<div class="sec-head"><span>${sec.name}</span><span>${sec.total}p · ${sec.projs.length} projet${sec.projs.length>1?'s':''}</span></div>`;
      sec.projs.forEach(p => {
        h += `<div class="proj-row"><span>${p.n}</span><div class="proj-right"><span class="proj-sem">${p.s}</span><span class="proj-p">${p.p}p</span></div></div>`;
      });
    });
    h += `</div>`;
  });
  document.getElementById('volCont').innerHTML = h;
}

// ══════════════════════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════════════════════
function toggleWk(id) {
  const card = document.getElementById('wk-' + id);
  card.classList.toggle('open');
}

function toggleTask(tid, wid, checked) {
  setDone(tid, checked);
  const row = document.getElementById('tr-' + tid);
  if (row) checked ? row.classList.add('done') : row.classList.remove('done');
  updateWeekProg(wid);
  updateGlobalProg();
}

function updateWeekProg(wid) {
  const entry = PLANNING.find(e => e.id === wid);
  if (!entry || !entry.tasks) return;
  const total = entry.tasks.length;
  const done = entry.tasks.filter(t => isDone(t.id)).length;
  const pct = Math.round(done/total*100);
  const fill = document.getElementById('wpf-' + wid);
  const lbl  = document.getElementById('wpp-' + wid);
  const th   = document.getElementById('th-'  + wid);
  const card = document.getElementById('wk-'  + wid);
  if (fill) fill.style.width = pct + '%';
  if (lbl)  lbl.textContent  = pct + '%';
  if (th)   th.textContent   = `Tâches · ${done}/${total}`;
  if (card) { pct===100 ? card.classList.add('done-all') : card.classList.remove('done-all'); }
}

function parseTaskPages(txt) {
  // Extract page count from task text e.g. "Maison Blind (4p)" → 4
  const m = txt.match(/\((\d+)p\)/);
  return m ? parseInt(m[1]) : 0;
}

function updateGlobalProg() {
  // Task progress
  const all  = PLANNING.filter(e => e.tasks).flatMap(e => e.tasks);
  const done = all.filter(t => isDone(t.id)).length;
  const pct  = Math.round(done/all.length*100);
  const fill = document.getElementById('gFill');
  const lbl  = document.getElementById('gLabel');
  if (fill) fill.style.width = pct + '%';
  if (lbl)  lbl.textContent  = `${done} / ${all.length}`;
  // Page progress — per task, parse (Xp) from task text
  let totalPages = 0, donePages = 0;
  PLANNING.forEach(e => {
    if (!e.tasks) return;
    e.tasks.forEach(t => {
      const p = parseTaskPages(t.txt);
      totalPages += p;
      if (isDone(t.id)) donePages += p;
    });
  });
  const pPct = totalPages ? Math.round(donePages/totalPages*100) : 0;
  const pFill = document.getElementById('pFill');
  const pLbl  = document.getElementById('pLabel');
  if (pFill) pFill.style.width = pPct + '%';
  if (pLbl)  pLbl.textContent  = `${donePages} / ${totalPages}p`;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.hdr-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelectorAll('.hdr-tab').forEach(b => {
    if (b.textContent.toLowerCase().includes(tab === 'planning' ? 'planning' : 'volumes')) b.classList.add('active');
  });
}





// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
state = loadLocal();
if (!GS_URL) { setSyncDot('local'); } else { setSyncDot('syncing'); }

renderPlanning();
renderVolumes();
updateGlobalProg();

if (GS_URL) {
  loadFromGS().then(ok => {
    if (ok) { renderPlanning(); updateGlobalProg(); }
    else { setSyncDot('local'); }
  }).catch(() => setSyncDot('local'));
}
</script>
