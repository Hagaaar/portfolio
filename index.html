<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Planning — HJ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0b;
  --surface: #131312;
  --surface2: #1a1a18;
  --border: #252523;
  --border2: #333330;
  --text: #e8e4dc;
  --text2: #9a9690;
  --text3: #5a5854;
  --setup: #6b7280;
  --setup-bg: #1c1e22;
  --reformat: #22c55e;
  --reformat-bg: #0d1f14;
  --nouveau: #60a5fa;
  --nouveau-bg: #0d1521;
  --finitions: #fbbf24;
  --finitions-bg: #1f1a0d;
  --conges: #4b4a48;
  --conges-bg: #131312;
  --vol1: #c084fc;
  --vol2: #34d399;
  --vol3: #fb923c;
  --accent: #e8d5a3;
  --radius: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}
.logo {
  font-family: 'DM Mono', monospace;
  font-size: 11px; letter-spacing: .12em;
  color: var(--text2); text-transform: uppercase;
}
.logo span { color: var(--accent); }

.tabs { display: flex; gap: 2px; }
.tab-btn {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 6px 16px; border: 1px solid transparent;
  background: none; color: var(--text3); cursor: pointer;
  border-radius: var(--radius); transition: all .15s;
}
.tab-btn.active {
  color: var(--text); background: var(--surface2);
  border-color: var(--border2);
}
.tab-btn:hover:not(.active) { color: var(--text2); }

.global-progress {
  display: flex; align-items: center; gap: 10px;
}
.global-progress-bar {
  width: 120px; height: 3px;
  background: var(--border2); border-radius: 2px; overflow: hidden;
}
.global-progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width .4s ease;
}
.global-progress-label {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--text3); letter-spacing: .06em;
}

/* ── TABS CONTENT ── */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── PLANNING TAB ── */
#tab-planning {
  max-width: 860px; margin: 0 auto;
  padding: 32px 24px 80px;
}

.week-entry { margin-bottom: 10px; }

/* Congés block */
.conges-block {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--conges-bg);
  padding: 14px 20px;
  display: flex; align-items: center; gap: 16px;
  opacity: .65;
}
.conges-icon { font-size: 18px; }
.conges-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--conges); letter-spacing: .1em; text-transform: uppercase; }
.conges-dates { font-size: 13px; color: var(--text2); }

/* Week card */
.week-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  overflow: hidden;
  transition: border-color .2s;
}
.week-card:hover { border-color: var(--border2); }
.week-card.completed { opacity: .55; }
.week-card.current { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent)22; }

.week-header {
  padding: 16px 20px;
  cursor: pointer;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  user-select: none;
}
.week-header:hover { background: var(--surface2); }

.week-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.week-num {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--text3); letter-spacing: .08em; min-width: 32px;
}
.type-badge, .vol-badge {
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 3px;
}
.type-setup    { background: var(--setup-bg);    color: var(--setup);    border: 1px solid var(--setup)44; }
.type-reformat { background: var(--reformat-bg); color: var(--reformat); border: 1px solid var(--reformat)44; }
.type-nouveau  { background: var(--nouveau-bg);  color: var(--nouveau);  border: 1px solid var(--nouveau)44; }
.type-finitions{ background: var(--finitions-bg);color: var(--finitions);border: 1px solid var(--finitions)44; }
.vol1-badge { background: #1e1229; color: var(--vol1); border: 1px solid var(--vol1)44; }
.vol2-badge { background: #0d1f19; color: var(--vol2); border: 1px solid var(--vol2)44; }
.vol3-badge { background: #1f1509; color: var(--vol3); border: 1px solid var(--vol3)44; }

.week-title-group { flex: 1; }
.week-title {
  font-size: 16px; font-weight: 400; color: var(--text);
  line-height: 1.3; margin-bottom: 3px;
}
.week-subtitle {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--text3); letter-spacing: .06em;
}

.week-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.week-pages {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--text3);
}
.week-progress-mini {
  display: flex; align-items: center; gap: 6px;
}
.week-progress-bar {
  width: 60px; height: 2px;
  background: var(--border2); border-radius: 1px; overflow: hidden;
}
.week-progress-fill {
  height: 100%; border-radius: 1px;
  transition: width .3s ease;
}
.reformat .week-progress-fill { background: var(--reformat); }
.nouveau  .week-progress-fill { background: var(--nouveau); }
.setup    .week-progress-fill { background: var(--setup); }
.finitions .week-progress-fill { background: var(--finitions); }

.week-progress-pct {
  font-family: 'DM Mono', monospace; font-size: 9px;
  color: var(--text3); min-width: 28px; text-align: right;
}
.chevron {
  color: var(--text3); font-size: 12px;
  transition: transform .2s; margin-left: 4px;
}
.week-card.open .chevron { transform: rotate(180deg); }

/* Tasks */
.tasks-panel {
  display: none; padding: 0 20px 16px;
  border-top: 1px solid var(--border);
}
.week-card.open .tasks-panel { display: block; }

.section-label {
  font-family: 'DM Mono', monospace; font-size: 9px;
  color: var(--text3); letter-spacing: .12em; text-transform: uppercase;
  padding: 12px 0 8px; border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}

.task-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  transition: opacity .2s;
}
.task-item:last-child { border-bottom: none; }
.task-item.done { opacity: .45; }

.task-check {
  width: 16px; height: 16px; flex-shrink: 0;
  border: 1px solid var(--border2);
  border-radius: 3px; margin-top: 2px;
  cursor: pointer; appearance: none;
  background: var(--surface);
  position: relative; transition: all .15s;
}
.task-check:checked {
  background: var(--accent);
  border-color: var(--accent);
}
.task-check:checked::after {
  content: '✓';
  position: absolute; top: -1px; left: 2px;
  font-size: 11px; color: var(--bg); font-weight: bold;
}
.task-text {
  font-size: 14px; color: var(--text); line-height: 1.5;
  flex: 1;
}
.task-item.done .task-text {
  text-decoration: line-through; color: var(--text3);
}
.task-note {
  font-family: 'DM Mono', monospace; font-size: 9px;
  color: var(--finitions); letter-spacing: .06em; margin-top: 2px;
}
.task-jalon {
  font-family: 'DM Mono', monospace; font-size: 9px;
  color: var(--reformat); letter-spacing: .06em;
}

/* Notes block */
.week-note {
  margin-top: 12px; padding: 10px 14px;
  background: var(--surface2); border-radius: var(--radius);
  border-left: 2px solid var(--border2);
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--text2); line-height: 1.7;
}
.week-note.warning { border-left-color: var(--finitions); }
.week-note.success { border-left-color: var(--reformat); }

/* ── VOLUMES TAB ── */
#tab-volumes {
  max-width: 860px; margin: 0 auto;
  padding: 32px 24px 80px;
}

.volumes-header {
  margin-bottom: 32px;
}
.volumes-header h2 {
  font-size: 28px; font-weight: 300; font-style: italic;
  color: var(--text); letter-spacing: -.01em; margin-bottom: 6px;
}
.volumes-header p {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--text3); letter-spacing: .08em;
}

.vol-summary {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  margin-bottom: 32px;
}
.vol-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 20px;
}
.vol-card-label {
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: .12em; text-transform: uppercase;
  margin-bottom: 8px;
}
.vol-card.v1 .vol-card-label { color: var(--vol1); }
.vol-card.v2 .vol-card-label { color: var(--vol2); }
.vol-card.v3 .vol-card-label { color: var(--vol3); }
.vol-card-title {
  font-size: 20px; font-weight: 300; font-style: italic;
  margin-bottom: 16px; color: var(--text);
}
.vol-bar-container {
  margin-bottom: 8px;
}
.vol-bar-track {
  width: 100%; height: 6px;
  background: var(--border2); border-radius: 3px; overflow: hidden;
  margin-bottom: 6px;
}
.vol-bar-fill {
  height: 100%; border-radius: 3px;
  transition: width .5s ease;
}
.v1 .vol-bar-fill { background: var(--vol1); }
.v2 .vol-bar-fill { background: var(--vol2); }
.v3 .vol-bar-fill { background: var(--vol3); }
.vol-bar-nums {
  display: flex; justify-content: space-between;
  font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3);
}
.vol-bar-nums .pages { color: var(--text); font-size: 13px; }
.vol-marge {
  font-family: 'DM Mono', monospace; font-size: 9px;
  color: var(--text3); margin-top: 6px;
}
.vol-marge span { color: var(--reformat); }

/* Detail tables */
.vol-detail {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  margin-bottom: 16px; overflow: hidden;
}
.vol-detail-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.vol-detail-header h3 {
  font-size: 16px; font-weight: 400;
  display: flex; align-items: center; gap: 10px;
}
.vol-detail-pages {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3);
}
.section-group { border-bottom: 1px solid var(--border); }
.section-group:last-child { border-bottom: none; }
.section-group-header {
  padding: 10px 20px;
  background: var(--surface2);
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--text2); letter-spacing: .08em; text-transform: uppercase;
}
.section-group-header .sec-pages {
  color: var(--text3);
}
.project-row {
  padding: 8px 20px 8px 32px;
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid var(--border);
  font-size: 14px;
}
.project-row:first-of-type { border-top-color: transparent; }
.project-pages {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3);
  flex-shrink: 0;
}
.project-semaine {
  font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3);
  flex-shrink: 0; margin-right: 12px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>

      ]},
      { name: 'Photographie', total: 46, projects: [
        { name: 'Calendrier ENSAM', pages: 10, semaine: 'S16' },
        { name: 'Divers', pages: 36, semaine: 'S18' },
      ]},
    ]
  }
];

// ── STATE ─────────────────────────────────────────────────────────────────────

const STORAGE_KEY = 'portfolio_planning_v7';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

let state = loadState();

function isTaskDone(taskId) { return !!state[taskId]; }
function setTaskDone(taskId, done) {
  state[taskId] = done;
  saveState(state);
}

// ── RENDERING ─────────────────────────────────────────────────────────────────

function renderPlanning() {
  const container = document.getElementById('planning-container');
  let html = '<div style="padding:32px 24px 80px;max-width:860px;margin:0 auto;">';

  PLANNING.forEach(entry => {
    if (entry.type === 'conges') {
      html += `<div class="week-entry">
        <div class="conges-block">
          <span class="conges-icon">✈️</span>
          <div>
            <div class="conges-label">Congés — hors planning</div>
            <div class="conges-dates">${entry.dates} · ${entry.label}</div>
          </div>
        </div>
      </div>`;
      return;
    }

    const totalTasks = entry.tasks.length;
    const doneTasks = entry.tasks.filter(t => isTaskDone(t.id)).length;
    const pct = totalTasks > 0 ? Math.round(doneTasks / totalTasks * 100) : 0;
    const isComplete = pct === 100;
    const isCurrent = !isComplete && isFirstIncomplete(entry);

    html += `<div class="week-entry">
      <div class="week-card ${entry.type} ${isComplete ? 'completed' : ''} ${isCurrent ? 'current' : ''}" id="week-${entry.id}">
        <div class="week-header" onclick="toggleWeek('${entry.id}')">
          <div class="week-title-group">
            <div class="week-meta" style="margin-bottom:6px;">
              <span class="week-num">${entry.week}</span>
              <span class="type-badge type-${entry.type}">${entry.type.toUpperCase()}</span>
              ${entry.volClass ? `<span class="type-badge ${entry.volClass}">${entry.volLabel}</span>` : ''}
            </div>
            <div class="week-title">${entry.title}</div>
            <div class="week-subtitle">${entry.dates} &nbsp;·&nbsp; ${entry.subtitle}</div>
          </div>
          <div class="week-right">
            ${entry.pages ? `<span class="week-pages">${entry.pages}</span>` : ''}
            <div class="week-progress-mini">
              <div class="week-progress-bar"><div class="week-progress-fill" id="wpf-${entry.id}" style="width:${pct}%"></div></div>
              <span class="week-progress-pct" id="wpp-${entry.id}">${pct}%</span>
            </div>
            <span class="chevron">▾</span>
          </div>
        </div>
        <div class="tasks-panel" id="tasks-${entry.id}">
          <div class="section-label">Tâches · ${doneTasks}/${totalTasks} complétées</div>
          ${entry.tasks.map(t => `
            <div class="task-item ${isTaskDone(t.id) ? 'done' : ''}" id="task-row-${t.id}">
              <input type="checkbox" class="task-check" id="chk-${t.id}"
                ${isTaskDone(t.id) ? 'checked' : ''}
                onchange="toggleTask('${t.id}', '${entry.id}', this.checked)">
              <div>
                <div class="task-text">${t.text}</div>
              </div>
            </div>
          `).join('')}
          ${entry.note ? `<div class="week-note ${entry.note.type}">${entry.note.text}</div>` : ''}
        </div>
      </div>
    </div>`;
  });

  html += '</div>';
  container.innerHTML = html;
}

function renderVolumes() {
  const container = document.getElementById('volumes-container');
  let html = `<div id="tab-volumes" class="tab-content active" style="max-width:860px;margin:0 auto;padding:32px 24px 80px;">
    <div class="volumes-header">
      <h2>Répartition des pages</h2>
      <p>3 VOLUMES · LULU 216×216 MM · LIMITE 240P/VOLUME</p>
    </div>
    <div class="vol-summary">`;

  VOLUMES.forEach(v => {
    const pct = Math.round(v.pages / v.limit * 100);
    html += `<div class="vol-card ${v.cls}">
      <div class="vol-card-label">${v.label}</div>
      <div class="vol-card-title">${v.title}</div>
      <div class="vol-bar-container">
        <div class="vol-bar-track"><div class="vol-bar-fill" style="width:${pct}%"></div></div>
        <div class="vol-bar-nums">
          <span class="pages">${v.pages}p</span>
          <span>/ ${v.limit}p max</span>
        </div>
      </div>
      <div class="vol-marge">Marge disponible : <span>+${v.marge}p</span></div>
    </div>`;
  });

  html += `</div>`;

  VOLUMES.forEach(v => {
    html += `<div class="vol-detail">
      <div class="vol-detail-header">
        <h3><span class="type-badge ${v.cls === 'v1' ? 'vol1-badge' : v.cls === 'v2' ? 'vol2-badge' : 'vol3-badge'}">${v.label}</span> ${v.title}</h3>
        <span class="vol-detail-pages">${v.pages}p / ${v.limit}p</span>
      </div>`;

    v.sections.forEach(sec => {
      html += `<div class="section-group">
        <div class="section-group-header">
          <span>${sec.name}</span>
          <span class="sec-pages">${sec.total}p — ${sec.projects.length} projet${sec.projects.length > 1 ? 's' : ''}</span>
        </div>`;
      sec.projects.forEach(p => {
        html += `<div class="project-row">
          <span>${p.name}</span>
          <div style="display:flex;gap:8px;align-items:center;">
            <span class="project-semaine">${p.semaine}</span>
            <span class="project-pages">${p.pages}p</span>
          </div>
        </div>`;
      });
      html += `</div>`;
    });

    html += `</div>`;
  });

  html += `</div>`;
  container.innerHTML = html;
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────

function isFirstIncomplete(entry) {
  if (entry.type === 'conges') return false;
  const doneTasks = entry.tasks.filter(t => isTaskDone(t.id)).length;
  if (doneTasks === entry.tasks.length) return false;
  // Check if all previous weeks are complete
  for (const e of PLANNING) {
    if (e.type === 'conges') continue;
    if (e.id === entry.id) return true;
    const d = e.tasks.filter(t => isTaskDone(t.id)).length;
    if (d < e.tasks.length) return false;
  }
  return false;
}

function toggleWeek(weekId) {
  const card = document.getElementById('week-' + weekId);
  const panel = document.getElementById('tasks-' + weekId);
  card.classList.toggle('open');
}

function toggleTask(taskId, weekId, checked) {
  setTaskDone(taskId, checked);
  const row = document.getElementById('task-row-' + taskId);
  if (checked) row.classList.add('done');
  else row.classList.remove('done');
  updateWeekProgress(weekId);
  updateGlobalProgress();
}

function updateWeekProgress(weekId) {
  const entry = PLANNING.find(e => e.id === weekId);
  if (!entry || !entry.tasks) return;
  const total = entry.tasks.length;
  const done = entry.tasks.filter(t => isTaskDone(t.id)).length;
  const pct = Math.round(done / total * 100);
  const fill = document.getElementById('wpf-' + weekId);
  const label = document.getElementById('wpp-' + weekId);
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = pct + '%';
  const card = document.getElementById('week-' + weekId);
  if (card) {
    if (pct === 100) card.classList.add('completed');
    else card.classList.remove('completed');
  }
  const sectionLabel = document.querySelector(`#tasks-${weekId} .section-label`);
  if (sectionLabel) sectionLabel.textContent = `Tâches · ${done}/${total} complétées`;
}

function updateGlobalProgress() {
  const allTasks = PLANNING.filter(e => e.tasks).flatMap(e => e.tasks);
  const total = allTasks.length;
  const done = allTasks.filter(t => isTaskDone(t.id)).length;
  const pct = Math.round(done / total * 100);
  const fill = document.getElementById('global-fill');
  const label = document.getElementById('global-label');
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = `${done} / ${total} tâches`;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent.toLowerCase().includes(tab === 'planning' ? 'planning' : 'volumes')) b.classList.add('active');
  });
}

function scrollToCurrentWeek() {
  // Open and scroll to first non-complete week
  for (const entry of PLANNING) {
    if (entry.type === 'conges') continue;
    const doneTasks = entry.tasks.filter(t => isTaskDone(t.id)).length;
    if (doneTasks < entry.tasks.length) {
      const card = document.getElementById('week-' + entry.id);
      if (card) {
        card.classList.add('open');
        setTimeout(() => {
          card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 150);
      }
      break;
    }
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────

renderPlanning();
renderVolumes();
updateGlobalProgress();

// Open current week on load
window.addEventListener('load', () => {
  setTimeout(scrollToCurrentWeek, 200);
});
</script>
</body>
</html>
