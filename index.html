<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Portfolio Planning</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Portfolio">
<meta name="theme-color" content="#0B0B12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ────────────────────────────────────────────── */
:root {
  --bg:    #0B0B12;
  --s1:    #121219;
  --s2:    #181820;
  --b1:    #1E1E2A;
  --b2:    #26263A;
  --tx:    #EEEAFF;
  --tx2:   #A8A6C8;
  --tx3:   #6A6888;

  --c1:    #F06020;  --c1t: #F89668;  --c1bg: #1A0C06;
  --c2:    #3A76F0;  --c2t: #7AAEFF;  --c2bg: #060C1E;
  --c3:    #12B888;  --c3t: #46D8AE;  --c3bg: #041410;

  --done:  #24CC7C;  --donedk: #041A0C;
  --amber: #E09820;  --amberdk: #1A1004;  --ambrt: #F0C040;
  --red:   #D84040;
  --setup: #6878A2;  --setupbg: #0C1018;  --setupt: #8CACD0;

  --safe-top: env(safe-area-inset-top,  0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--tx);
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 14px; line-height: 1.5;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}

/* ── HEADER ────────────────────────────────────────────── */
#header {
  position: sticky; top: 0; z-index: 200;
  background: var(--bg); padding-top: var(--safe-top);
}
.hdr-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 0;
}
.hdr-title {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase;
  color: var(--tx2);
}
.hdr-sync { display: flex; align-items: center; gap: 6px; }
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--b2); flex-shrink: 0; transition: background .4s;
}
.sync-dot.ok      { background: var(--done); }
.sync-dot.syncing { background: var(--amber); animation: blink .8s infinite; }
.sync-dot.offline { background: var(--red); }
.sync-lbl { font-family: 'Inter', sans-serif; font-size: 9px; color: var(--tx3); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Hero progress bar */
.hdr-hero { padding: 10px 14px 0; }
.hero-bar {
  position: relative; height: 64px;
  background: var(--s1); border-radius: 14px; overflow: hidden;
}
.hero-bar-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--done);
  transition: width .7s cubic-bezier(.2,0,.4,1);
}
.hero-bar-content {
  position: absolute; inset: 0; z-index: 1;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px;
}
.hero-pct {
  font-size: 30px; font-weight: 900; color: #fff;
  text-shadow: 0 1px 6px rgba(0,0,0,.5); line-height: 1;
}
.hero-stats { text-align: right; }
.hero-tasks {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600; color: rgba(255,255,255,.88);
}
.hero-pages {
  font-family: 'Inter', sans-serif;
  font-size: 9px; color: rgba(255,255,255,.72); margin-top: 1px;
}

/* Memo hero bar */
.hdr-hero-memo { padding: 6px 14px 0; }
.hero-bar-memo {
  position: relative; height: 48px;
  background: var(--s1); border-radius: 14px; overflow: hidden;
}
.hero-bar-fill-memo {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: #E09820;
  transition: width .7s cubic-bezier(.2,0,.4,1);
}

/* ── BOTTOM NAV ──────────────────────────────────────────── */
.bottom-nav {
  position: fixed;
  bottom: calc(16px + var(--safe-bot));
  left: 50%; transform: translateX(-50%);
  z-index: 300;
  display: flex; align-items: center;
  background: rgba(14,14,20,.92);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 22px;
  padding: 4px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  min-width: 230px;
}
.bnav-slider {
  position: absolute;
  top: 4px; bottom: 4px;
  width: calc(33.333% - 4px);
  background: var(--b2);
  border-radius: 18px;
  transition: left .22s ease;
  left: 4px;
  pointer-events: none;
}
.bnav-btn {
  flex: 1; position: relative; z-index: 1;
  border: none; background: none;
  padding: 10px 24px;
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: .10em; text-transform: uppercase;
  color: var(--tx3); cursor: pointer;
  transition: color .2s;
  -webkit-appearance: none;
  border-radius: 18px;
  white-space: nowrap;
}
.bnav-btn.active { color: var(--tx); }
.bnav-btn[data-tab="memoire"].active { color: #E09820; }
.memo-alert-badge {
  position: absolute; top: 0; right: 0;
  display: none;
  background: #E09820; color: #000;
  border-radius: 99px;
  font-size: 8px; font-weight: 700;
  padding: 1px 5px; line-height: 1.4;
}
.memo-alert-badge.show { display: inline-block; }

/* ── TAB PAGES ──────────────────────────────────────────── */
.tab-page { display: none; padding-bottom: calc(110px + var(--safe-bot)); }
.tab-page.active { display: block; }

/* ── BADGES — fully rounded (pill) ─────────────────────── */
.badge {
  font-family: 'Inter', sans-serif;
  font-size: 8px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 99px; line-height: 1.6; white-space: nowrap;
}
.bw          { background: var(--b2);                    color: var(--tx3); }
.b-now       { background: var(--amber);                 color: #000; }
.b-reformat  { background: rgba(240,96,32,.14);          color: var(--c1t); }
.b-nouveau   { background: rgba(58,118,240,.14);         color: var(--c2t); }
.b-setup     { background: rgba(104,120,162,.14);        color: var(--setupt); }
.b-finitions { background: rgba(224,152,32,.14);         color: var(--ambrt); }
.b-vol1      { background: rgba(240,96,32,.12);          color: var(--c1t); }
.b-vol2      { background: rgba(58,118,240,.12);         color: var(--c2t); }
.b-vol3      { background: rgba(18,184,136,.12);         color: var(--c3t); }
.b-memo-linked { background: rgba(224,152,32,.14);        color: #F0C040; }
.b-memo-done   { background: rgba(36,204,124,.14);        color: var(--done); }
.b-memo-phase  { background: rgba(224,152,32,.14);        color: #F0C040; }

/* ── VOLUME ACCORDIONS ──────────────────────────────────── */
.vol-list { padding: 10px 14px; display: flex; flex-direction: column; gap: 10px; }

.vol-acc {
  background: var(--s1);
  border-radius: 14px;
  border: 2px solid var(--b2);
  overflow: hidden;
}
.vol-acc.v1 { border-color: var(--c1); }
.vol-acc.v2 { border-color: var(--c2); }
.vol-acc.v3 { border-color: var(--c3); }

.vacc-head {
  padding: 16px 16px 14px;
  cursor: pointer; user-select: none;
  position: relative; overflow: hidden;
}
.vacc-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  pointer-events: none; z-index: 0;
  transition: width .6s cubic-bezier(.2,0,.4,1);
}
.vol-acc.v1 .vacc-fill { background: rgba(240,96,32,.75); }
.vol-acc.v2 .vacc-fill { background: rgba(58,118,240,.75); }
.vol-acc.v3 .vacc-fill { background: rgba(18,184,136,.75); }
.vacc-head > *:not(.vacc-fill) { position: relative; z-index: 1; }

.vacc-body { display: none; position: relative; overflow: hidden; }
.vol-acc.open .vacc-body { display: block; }
.vacc-body-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  pointer-events: none; z-index: 0;
  transition: width .6s cubic-bezier(.2,0,.4,1);
}
.vol-acc.v1 .vacc-body-fill { background: rgba(240,96,32,.75); }
.vol-acc.v2 .vacc-body-fill { background: rgba(58,118,240,.75); }
.vol-acc.v3 .vacc-body-fill { background: rgba(18,184,136,.75); }
.vacc-body > *:not(.vacc-body-fill) { position: relative; z-index: 1; }

.vacc-top {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 14px;
}
.vacc-lbl {
  font-family: 'Inter', sans-serif;
  font-size: 9px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
  margin-bottom: 3px;
}
.vol-acc.v1 .vacc-lbl { color: var(--c1t); }
.vol-acc.v2 .vacc-lbl { color: var(--c2t); }
.vol-acc.v3 .vacc-lbl { color: var(--c3t); }

.vacc-title {
  font-size: 20px; font-weight: 800; color: var(--tx);
}

.vacc-right { display: flex; align-items: center; gap: 8px; }
.vacc-pct {
  font-size: 48px; font-weight: 900; line-height: 1;
}
.vol-acc.v1 .vacc-pct { color: var(--c1); }
.vol-acc.v2 .vacc-pct { color: var(--c2); }
.vol-acc.v3 .vacc-pct { color: var(--c3); }
.vacc-chev {
  font-size: 10px; color: var(--tx3); margin-top: 6px;
  transition: transform .2s; align-self: flex-start;
}
.vol-acc.open .vacc-chev { transform: rotate(180deg); }

.vacc-stats {
  display: flex; justify-content: space-between;
  font-family: 'Inter', sans-serif; font-size: 9px; color: var(--tx2);
}
.vacc-stats .hi { color: var(--tx); font-weight: 600; }

.vsec { border-bottom: 1px solid var(--b1); }
.vsec:last-child { border-bottom: none; }
.vsec-hdr {
  padding: 8px 16px;
  display: flex; justify-content: space-between; align-items: center;
  background: var(--s2);
  border-bottom: 1px solid var(--b1);
}
.vsec-name {
  font-family: 'Inter', sans-serif;
  font-size: 9px; font-weight: 600; letter-spacing: .10em; text-transform: uppercase;
  color: var(--tx2);
}
.vsec-right { display: flex; align-items: center; gap: 8px; }
.vsec-total { font-family: 'Inter', sans-serif; font-size: 9px; color: var(--tx3); }

.vsec-mini-bar {
  width: 50px; height: 4px;
  background: var(--b2); border-radius: 99px; overflow: hidden;
}
.vsec-mini-fill {
  height: 100%; border-radius: 99px; transition: width .4s;
}
.vol-acc.v1 .vsec-mini-fill { background: var(--c1); }
.vol-acc.v2 .vsec-mini-fill { background: var(--c2); }
.vol-acc.v3 .vsec-mini-fill { background: var(--c3); }

.proj-row {
  padding: 8px 16px 8px 22px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--b1);
  font-size: 12px; color: var(--tx);
}
.proj-row:last-child { border-bottom: none; }
.proj-left { display: flex; align-items: center; gap: 8px; }
.proj-dot {
  width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
  background: var(--b2);
}
.proj-row.proj-done .proj-dot {
  background: var(--done);
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 900; color: #000;
}
.proj-row.proj-done { color: var(--done); }
.proj-right { display: flex; gap: 8px; align-items: center; }
.proj-sem {
  font-family: 'Inter', sans-serif;
  font-size: 8px; color: var(--tx3);
  background: var(--b2); padding: 1px 6px; border-radius: 99px;
}
.proj-row.proj-done .proj-sem { background: rgba(36,204,124,.12); color: var(--done); }
.proj-p {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600; color: var(--tx);
  min-width: 28px; text-align: right;
}
.proj-row.proj-done .proj-p { color: var(--done); }

/* ── PLANNING — WEEK CARDS ──────────────────────────────── */
#planCont { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }
.wk {
  background: var(--s1);
  border-radius: 14px;
  border: 2px solid var(--b2);
  overflow: hidden;
}
.wk.t-reformat  { border-color: var(--c1); }
.wk.t-nouveau   { border-color: var(--c2); }
.wk.t-setup     { border-color: var(--setup); }
.wk.t-finitions { border-color: var(--amber); }

/* Week header */
.wk-head {
  padding: 10px 14px;
  cursor: pointer; user-select: none;
  display: flex; align-items: center; gap: 12px;
  min-height: 60px; position: relative; overflow: hidden;
  transition: background .1s;
}
.wk-head:active { background: var(--s2); }

.wk-pbar {
  position: absolute; left: 0; top: 0; bottom: 0;
  pointer-events: none; z-index: 0;
  transition: width .5s cubic-bezier(.2,0,.4,1);
}
.wk.t-reformat  .wk-pbar { background: rgba(240,96,32,.75); }
.wk.t-nouveau   .wk-pbar { background: rgba(58,118,240,.75); }
.wk.t-setup     .wk-pbar { background: rgba(104,120,162,.75); }
.wk.t-finitions .wk-pbar { background: rgba(224,152,32,.75); }
.wk.done-all.t-reformat  .wk-pbar { background: rgba(240,96,32,.95) !important; }
.wk.done-all.t-nouveau   .wk-pbar { background: rgba(58,118,240,.95) !important; }
.wk.done-all.t-setup     .wk-pbar { background: rgba(104,120,162,.95) !important; }
.wk.done-all.t-finitions .wk-pbar { background: rgba(224,152,32,.95) !important; }
.wk-head > *:not(.wk-pbar) { position: relative; z-index: 1; }

.wk-head-pct {
  flex-shrink: 0;
  font-family: 'Inter', sans-serif;
  font-size: 22px; font-weight: 900;
  color: #fff; text-shadow: 0 1px 5px rgba(0,0,0,.45); line-height: 1;
}

/* SVG circle */
.wk-circ {
  flex-shrink: 0; width: 42px; height: 42px; position: relative;
  border-radius: 10px; background: var(--b1);
}
.wk-circ svg { width: 42px; height: 42px; transform: rotate(-90deg); }
.circ-bg { fill: none; stroke: var(--b2); stroke-width: 3.5; }
.circ-fg {
  fill: none; stroke: var(--done);
  stroke-width: 3.5; stroke-linecap: round;
  transition: stroke-dashoffset .5s cubic-bezier(.4,0,.2,1);
}
.circ-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Inter', sans-serif;
  font-size: 9px; font-weight: 700; color: var(--tx2);
}
.wk.is-current .circ-num { color: var(--tx); }

/* Week info */
.wk-info { flex: 1; min-width: 0; }
.wk-badges { display: flex; gap: 4px; flex-wrap: nowrap; overflow: hidden; margin-bottom: 3px; }
.wk-title {
  font-size: 14px; font-weight: 700; color: var(--tx);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.3; margin-bottom: 2px;
}
.wk-sub { font-size: 10px; color: #fff; }
.wk-right { flex-shrink: 0; }
.chev { font-size: 8px; color: var(--tx3); transition: transform .2s; }
.wk.open .chev { transform: rotate(180deg); }

/* Tasks panel */
.wk-tasks { display: none; border-radius: 0 0 12px 12px; position: relative; overflow: hidden; }
.wk.open .wk-tasks { display: block; }
.wk-tasks-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  pointer-events: none; z-index: 0;
  transition: width .5s cubic-bezier(.2,0,.4,1);
}
.wk.t-reformat  .wk-tasks-fill { background: rgba(240,96,32,.75); }
.wk.t-nouveau   .wk-tasks-fill { background: rgba(58,118,240,.75); }
.wk.t-setup     .wk-tasks-fill { background: rgba(104,120,162,.75); }
.wk.t-finitions .wk-tasks-fill { background: rgba(224,152,32,.75); }
.wk.done-all.t-reformat  .wk-tasks-fill { background: rgba(240,96,32,.95); }
.wk.done-all.t-nouveau   .wk-tasks-fill { background: rgba(58,118,240,.95); }
.wk.done-all.t-setup     .wk-tasks-fill { background: rgba(104,120,162,.95); }
.wk.done-all.t-finitions .wk-tasks-fill { background: rgba(224,152,32,.95); }
.wk-tasks > *:not(.wk-tasks-fill) { position: relative; z-index: 1; }
.task-step:not(.done) { background: rgba(0,0,0,.22); }

/* Week progress bar inside tasks panel */
.wk-prog {
  position: relative; height: 44px;
  overflow: hidden;
  background: var(--bg);
  margin: 6px 6px 4px;
  border-radius: 10px;
}
.wk-prog-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  transition: width .5s;
}
.wk.t-reformat  .wk-prog-fill { background: var(--c1); }
.wk.t-nouveau   .wk-prog-fill { background: var(--c2); }
.wk.t-setup     .wk-prog-fill { background: var(--setup); }
.wk.t-finitions .wk-prog-fill { background: var(--amber); }
.wk.done-all    .wk-prog-fill { background: var(--done); }
.wk-prog-text {
  position: absolute; inset: 0; z-index: 1;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
}
.wk-prog-pct {
  font-size: 22px; font-weight: 900; color: #fff;
  text-shadow: 0 1px 5px rgba(0,0,0,.5); line-height: 1;
}
.wk-prog-count {
  font-family: 'Inter', sans-serif;
  font-size: 10px; color: rgba(255,255,255,.6);
}

/* Task step */
.task-step {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; min-height: 44px;
  border-radius: 10px;
  margin: 1px 6px;
  cursor: pointer; transition: background .12s;
}
.task-step:first-of-type { margin-top: 6px; }
.task-step:last-of-type  { margin-bottom: 6px; }
.task-step:active { background: var(--s2); }
.task-step.done   { background: var(--done); }
.task-step.done:active { background: rgba(0,0,0,.06); }

.step-num {
  flex-shrink: 0;
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Inter', sans-serif;
  font-size: 9px; font-weight: 700;
  background: var(--b2); color: var(--tx3);
  margin-top: 1px;
  transition: background .2s, color .2s, transform .15s;
}
.step-num.done { background: rgba(0,0,0,.22); color: rgba(0,0,0,.85); font-size: 11px; }
@keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.4)} 100%{transform:scale(1)} }
.step-num.popping { animation: pop .22s ease-out; }

.step-body { flex: 1; min-width: 0; }
.step-txt { font-size: 12px; color: var(--tx); line-height: 1.5; }
.task-step.done .step-txt { color: rgba(0,0,0,.82); font-weight: 500; }
.step-pbadge {
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 700;
  color: var(--tx2); background: var(--b2);
  padding: 3px 8px; border-radius: 99px;
  flex-shrink: 0; align-self: center; white-space: nowrap;
}
.task-step.done .step-pbadge { color: rgba(0,0,0,.55); background: rgba(0,0,0,.12); }

/* Note — fill animé bord à bord, même logique que wk-pbar */
.wk-note {
  position: relative; overflow: hidden;
  margin: 0;
  border-radius: 0 0 12px 12px;
  padding: 9px 12px;
  font-size: 11px; color: #fff; line-height: 1.6;
  background: var(--s1);
}
.wk-note-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  pointer-events: none; z-index: 0;
  transition: width .5s cubic-bezier(.2,0,.4,1);
}
.wk.t-reformat  .wk-note-fill { background: rgba(240,96,32,.75); }
.wk.t-nouveau   .wk-note-fill { background: rgba(58,118,240,.75); }
.wk.t-setup     .wk-note-fill { background: rgba(104,120,162,.75); }
.wk.t-finitions .wk-note-fill { background: rgba(224,152,32,.75); }
.wk.done-all.t-reformat  .wk-note-fill { background: rgba(240,96,32,.95); }
.wk.done-all.t-nouveau   .wk-note-fill { background: rgba(58,118,240,.95); }
.wk.done-all.t-setup     .wk-note-fill { background: rgba(104,120,162,.95); }
.wk.done-all.t-finitions .wk-note-fill { background: rgba(224,152,32,.95); }
.wk-note-txt { position: relative; z-index: 1; }

/* Vacation separator */
.conges-row {
  padding: 10px 16px; background: var(--bg);
  border-bottom: 1px solid var(--b1);
  display: flex; align-items: center; gap: 10px;
}
.conges-dates { font-size: 11px; color: var(--tx2); }
.conges-tag {
  display: inline-block; margin-top: 2px;
  font-family: 'Inter', sans-serif;
  font-size: 8px; font-weight: 600; letter-spacing: .08em;
  padding: 2px 8px; border-radius: 99px;
  background: var(--b2); color: var(--tx3); text-transform: uppercase;
}

/* ── DONE-ALL : header rempli à 100% avec la couleur du type ─── */
.wk.done-all .wk-head-pct { color: #fff; text-shadow: 0 1px 5px rgba(0,0,0,.45); }

.mp-tasks { display: none; }

.mp-note {
  position: relative; overflow: hidden;
  margin: 0;

  padding: 9px 12px;

  background: var(--s1);
}
.mp-note-fill {
  position: absolute; left: 0; top: 0; bottom: 0;

  pointer-events: none; z-index: 0;
  transition: width .5s cubic-bezier(.2,0,.4,1);
}
.mp-note-txt { position: relative; z-index: 1; }

.memo-portfolio-ok {

}

const GS_URL   = 'https://script.google.com/macros/s/AKfycbyfbn-CTbvLfoOKnD1S9obFLJSbzfc0uN2Dvouq_vuNM7BjN4QX5P3m7ZTBbn_4TBV2/exec';
const GS_TOKEN = 'hj-portfolio-2026-sync';
const LS_KEY = 'portfolio_v7_state';
const CIRC_C = (2 * Math.PI * 16).toFixed(2); // ≈ 100.53

let state = {};

function loadLocal() {
  try { const r = localStorage.getItem(LS_KEY); return r ? JSON.parse(r) : {}; } catch { return {}; }
}
function saveLocal() { try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch {} }

function setSyncDot(s) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  if (!dot) return;
  const m = { ok:['ok','Synchronisé'], syncing:['syncing','Sync…'], error:['offline','Erreur'], offline:['offline','Hors ligne'], local:['','Local'] };
  const [cls,txt] = m[s] || m.local;
  dot.className = 'sync-dot' + (cls ? ' '+cls : '');
  if (lbl) lbl.textContent = txt;
}

let saveTimer = null;
function scheduleRemoteSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      setSyncDot('syncing');
      await fetch(GS_URL, { method:'POST', mode:'no-cors', body:JSON.stringify({ token:GS_TOKEN, state }) });
      setSyncDot('ok');
    } catch { setSyncDot('offline'); }
  }, 800);
}

async function loadFromGS() {
  try {
    setSyncDot('syncing');
    const r = await fetch(GS_URL + '?token=' + GS_TOKEN);
    const remote = await r.json();
    if (remote && Object.keys(remote).length > 0)
      Object.keys(remote).forEach(k => { if (remote[k]) state[k] = true; });
    saveLocal(); setSyncDot('ok'); return true;
  } catch { setSyncDot('offline'); return false; }
}

const isDone = id => !!state[id];
function setDone(id, v) {
  if (v) state[id] = true; else delete state[id];
  saveLocal(); scheduleRemoteSave();
}

// TASK → VOLUME MAP
// Chaque tâche est rattachée à un volume dès l'init,
// pour que cocher une tâche mette à jour le % volume immédiatement.
// ══════════════════════════════════════════════════════════
const taskVolMap = {}; // taskId → volId

function buildTaskVolMap() {
  PLANNING.forEach(e => {
    if (!e.tasks) return;

    // Trouver quels volumes ont des projets dans cette semaine
    const volsInWeek = new Set();
    VOLUMES.forEach(vol =>
      vol.sections.forEach(sec =>
        sec.projs.forEach(p => { if (p.s === e.week) volsInWeek.add(vol.id); })
      )
    );

    if (!volsInWeek.size) return; // Semaine sans projets dans les volumes (S01 setup)

    if (volsInWeek.size === 1) {
      // Semaine mono-volume : toutes les tâches → ce volume
      const volId = [...volsInWeek][0];
      e.tasks.forEach(t => { taskVolMap[t.id] = volId; });
    } else {
      // Semaine multi-volumes (ex: S10 avec Vol.1 + Vol.3) :
      // Matching par nom de projet dans le texte de la tâche, sinon volume primaire
      e.tasks.forEach(t => {
        let assigned = false;
        for (const vol of VOLUMES) {
          if (!volsInWeek.has(vol.id)) continue;
          for (const sec of vol.sections) {
            for (const p of sec.projs) {
              if (p.s === e.week && t.txt.includes(p.n)) {
                taskVolMap[t.id] = vol.id;
                assigned = true;
                break;
              }
            }
            if (assigned) break;
          }
          if (assigned) break;
        }
        if (!assigned) {
          // Fallback : volume primaire déclaré dans e.vol
          const pv = e.vol ? e.vol.replace('b-', '') : [...volsInWeek][0];
          taskVolMap[t.id] = volsInWeek.has(pv) ? pv : [...volsInWeek][0];
        }
      });
    }
  });
}

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════
function findCurrentWeek() {
  for (const e of PLANNING) {
    if (e.type === 'conges') continue;
    if (e.tasks.filter(t => isDone(t.id)).length < e.tasks.length) return e.id;
  }
  return null;
}

function isWeekDone(weekId) {
  const e = PLANNING.find(e => e.week === weekId || e.id === weekId);
  return e && e.tasks && e.tasks.length > 0 && e.tasks.every(t => isDone(t.id));
}

// Pages réalisées pour un volume, calculées tâche par tâche (pas all-or-nothing).
// Pour chaque semaine contenant des projets du volume, on proratise les pages
// selon la fraction de tâches attribuées à ce volume qui sont cochées.
function calcVolDonePages(volId) {
  const vol = VOLUMES.find(v => v.id === volId);
  if (!vol) return { done: 0, total: 0, pct: 0 };

  // Pages totales du volume dans chaque semaine
  const weekPagesMap = {};
  vol.sections.forEach(sec => sec.projs.forEach(p => {
    weekPagesMap[p.s] = (weekPagesMap[p.s] || 0) + p.p;
  }));

  let doneP = 0;
  Object.entries(weekPagesMap).forEach(([wk, pagesInWeek]) => {
    const entry = PLANNING.find(x => x.week === wk);
    if (!entry || !entry.tasks) return;
    // Tâches de cette semaine rattachées à ce volume
    const vTasks = entry.tasks.filter(t => taskVolMap[t.id] === volId);
    if (!vTasks.length) return;
    const done = vTasks.filter(t => isDone(t.id)).length;
    doneP += (done / vTasks.length) * pagesInWeek;
  });

  doneP = Math.round(doneP);
  const pct = vol.pages ? Math.round(doneP / vol.pages * 100) : 0;
  return { done: doneP, total: vol.pages, pct };
}

function stripEmoji(s) {
  return s
    .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
    .replace(/[☀-➿]️?/g, '')
    .replace(/\s+/g, ' ').trim();
}
function cleanTxt(txt) { return stripEmoji(txt).replace(/\s*\(\d+p\)/gi,'').trim(); }
function getP(txt) { const m = txt.match(/\((\d+)p\)/i); return m ? m[1] : null; }
function circOffset(pct) { return (parseFloat(CIRC_C) * (1 - pct/100)).toFixed(1); }

// RENDER — PLANNING
// ══════════════════════════════════════════════════════════
function renderPlanning() {
  const curId = findCurrentWeek();
  let h = '';

  PLANNING.forEach(e => {
    if (e.type === 'conges') return; // Pas d'affichage des congés

    const total = e.tasks.length;
    const done  = e.tasks.filter(t => isDone(t.id)).length;
    const pct   = total ? Math.round(done/total*100) : 0;
    const isAll = done === total;
    const isCur = e.id === curId;

    const volBadge = e.vol
      ? `<span class="badge b-${e.vol.replace('b-','')}">${e.volLbl}</span>` : '';
    const memoBadge = WEEK_MEMO_LINKS[e.id] ? memoBadgeHtml(e.id) : '';

    h += `<div class="wk t-${e.type}${isAll?' done-all':''}${isCur?' open is-current':''}" id="wk-${e.id}">
      <div class="wk-head" onclick="toggleWk('${e.id}')">
        <div class="wk-pbar" id="wpb-${e.id}" style="width:${pct}%"></div>
        <div class="wk-info">
          <div class="wk-badges" id="wkb-${e.id}">
            <span class="badge bw">${e.week}</span>
            <span class="badge b-${e.type}">${e.type.toUpperCase()}</span>
            ${volBadge}
            ${memoBadge}
          </div>
          <div class="wk-title">${stripEmoji(e.title)}</div>
          <div class="wk-sub">${e.dates}${e.pages?' · '+e.pages:''}</div>
        </div>
        ${isCur?'<span class="badge b-now">EN COURS</span>':''}
        <span class="wk-head-pct" id="wpp-${e.id}">${pct}%</span>
        <span class="chev">▾</span>
      </div>
      <div class="wk-tasks" id="wkt-${e.id}">
        <div class="wk-tasks-fill" id="wtf-${e.id}" style="width:${pct}%"></div>
        ${e.tasks.map((t,i) => `
          <div class="task-step${isDone(t.id)?' done':''}" id="ts-${t.id}"
            onclick="taskClick('${t.id}','${e.id}')">
            <div class="step-num${isDone(t.id)?' done':''}"
              data-num="${String(i+1).padStart(2,'0')}" id="sn-${t.id}">
              ${isDone(t.id)?'✓':String(i+1).padStart(2,'0')}
            </div>
            <div class="step-body">
              <div class="step-txt">${cleanTxt(t.txt)}</div>
            </div>
            ${getP(t.txt)?`<div class="step-pbadge">${getP(t.txt)}p</div>`:''}
          </div>`).join('')}
        ${e.note?`<div class="wk-note">
          <div class="wk-note-fill" id="wnf-${e.id}" style="width:${pct}%"></div>
          <div class="wk-note-txt">${stripEmoji(e.note.txt)}</div>
        </div>`:''}
      </div>
    </div>`;
  });

  document.getElementById('planCont').innerHTML = h;
}

// ══════════════════════════════════════════════════════════
// RENDER — VOLUMES
// ══════════════════════════════════════════════════════════
function renderVolumes() {
  let h = '<div class="vol-list">';

  VOLUMES.forEach(v => {
    const { done, total, pct } = calcVolDonePages(v.id);
    const isOpen = document.querySelector(`#vacc-${v.id}`)?.classList.contains('open') || false;

    h += `<div class="vol-acc ${v.cls}${isOpen?' open':''}" id="vacc-${v.id}">
      <div class="vacc-head" onclick="toggleVol('${v.id}')">
        <div class="vacc-fill" style="width:${pct}%"></div>
        <div class="vacc-top">
          <div class="vacc-meta">
            <div class="vacc-lbl">${v.lbl}</div>
            <div class="vacc-title">${v.title}</div>
          </div>
          <div class="vacc-right">
            <div class="vacc-pct" id="vpct-${v.id}">${pct}%</div>
            <span class="vacc-chev">▾</span>
          </div>
        </div>
        <div class="vacc-stats">
          <span><span class="hi" id="vdone-${v.id}">${done}p</span> mises en page</span>
          <span>sur ${total}p planifiées</span>
        </div>
      </div>
      <div class="vacc-body">
        <div class="vacc-body-fill" style="width:${pct}%"></div>`;

    v.sections.forEach(sec => {
      const doneProjs = sec.projs.filter(p => isWeekDone(p.s)).length;
      const secPct = Math.round(doneProjs / sec.projs.length * 100);

      h += `<div class="vsec">
        <div class="vsec-hdr">
          <span class="vsec-name">${sec.name}</span>
          <div class="vsec-right">
            <span class="vsec-total">${sec.total}p</span>
            <div class="vsec-mini-bar">
              <div class="vsec-mini-fill" style="width:${secPct}%"></div>
            </div>
          </div>
        </div>`;

      sec.projs.forEach(p => {
        const d = isWeekDone(p.s);
        h += `<div class="proj-row${d?' proj-done':''}">
          <div class="proj-left">
            <div class="proj-dot">${d?'✓':''}</div>
            <span>${p.n}</span>
          </div>
          <div class="proj-right">
            <span class="proj-sem">${p.s}</span>
            <span class="proj-p">${p.p}p</span>
          </div>
        </div>`;
      });

      h += `</div>`; // vsec
    });

    h += `</div></div>`; // vacc-body + vol-acc
  });

  h += '</div>';
  document.getElementById('volCont').innerHTML = h;
}

// RENDER — MEMOIRE

function renderMemoire() {
  let h = '';

  MEMO_PHASES.forEach(p => {
    const total = p.tasks.length;
    const done  = p.tasks.filter(t => isDone(t.id)).length;
    const pct   = total ? Math.round(done/total*100) : 0;
    const isAll = done === total;

      <div class="mp-head" onclick="toggleMemoPhase('${p.id}')">

        <span class="chev">▾</span>

            onclick="memoTaskClick('${t.id}','${p.id}')">

              data-num="${String(i+1).padStart(2,'0')}" id="sn-${t.id}">

            </div>

              <div class="step-txt">${t.txt}</div>

// ══════════════════════════════════════════════════════════
// MEMOIRE — INTERACTIONS
// ══════════════════════════════════════════════════════════
function toggleMemoPhase(id) {
  document.getElementById('mp-'+id).classList.toggle('open');
}

function memoTaskClick(taskId, phaseId) {
  const newVal = !isDone(taskId);
  setDone(taskId, newVal);

  const row = document.getElementById('ts-'+taskId);
  if (row) {
    row.classList.toggle('done', newVal);
    const num = document.getElementById('sn-'+taskId);
    if (num) {
      num.textContent = newVal ? '✓' : num.dataset.num;
      num.classList.toggle('done', newVal);
      num.classList.add('popping');
      setTimeout(() => num.classList.remove('popping'), 300);
    }
  }

  updateMemoPhaseUI(phaseId);
  updateMemoGlobalProg();

  if (MEMO_LINKS[taskId]) updateWeekMemoBadge(MEMO_LINKS[taskId]);

  calcMemoAlertCount();
}

function updateMemoPhaseUI(phaseId) {
  const p = MEMO_PHASES.find(x => x.id === phaseId);
  if (!p) return;
  const total = p.tasks.length;
  const done  = p.tasks.filter(t => isDone(t.id)).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  const isAll = done === total;

  const card = document.getElementById('mp-'+phaseId);
  const pbar = document.getElementById('mppb-'+phaseId);
  const ppct = document.getElementById('mppp-'+phaseId);
  if (pbar) pbar.style.width = pct+'%';
  if (ppct) ppct.textContent = pct+'%';
  if (card) card.classList.toggle('done-all', isAll);

  const noteFill = document.getElementById('mnf-'+phaseId);
  if (noteFill) noteFill.style.width = pct+'%';

  // Mettre à jour les badges "portfolio OK" des tâches de cette phase
  p.tasks.forEach(t => {
    const badge = document.getElementById('mpok-'+t.id);
    const show = t.portfolioLink && isWeekDone(t.portfolioLink) && !isDone(t.id);
    if (show && !badge) {
      const body = document.querySelector(`#ts-${t.id} .step-body`);
      if (body) body.insertAdjacentHTML('beforeend',
        `<span class="memo-portfolio-ok" id="mpok-${t.id}">Portfolio ${t.portfolioLink.toUpperCase()} terminé — peut écrire</span>`);
    } else if (!show && badge) {
      badge.remove();
    }
  });
}

function updateMemoGlobalProg() {
  const allMemoTasks = MEMO_PHASES.flatMap(p => p.tasks);
  const doneMemo = allMemoTasks.filter(t => isDone(t.id)).length;
  const pctMemo = allMemoTasks.length ? Math.round(doneMemo / allMemoTasks.length * 100) : 0;

  const currentPhase = MEMO_PHASES.find(p => p.tasks.some(t => !isDone(t.id)));

  const fill = document.getElementById('mFill');
  const pct  = document.getElementById('mPct');
  const lbl  = document.getElementById('mLabel');
  const plbl = document.getElementById('mPhaseLabel');
  if (fill) fill.style.width = pctMemo + '%';
  if (pct)  pct.textContent = pctMemo + '%';
  if (lbl)  lbl.textContent = doneMemo + ' / ' + allMemoTasks.length + ' tâches';
  if (plbl) plbl.textContent = currentPhase ? currentPhase.label + ' — ' + currentPhase.title : 'Mémoire terminé';

  calcMemoAlertCount();
}

function calcMemoAlertCount() {
  const count = Object.entries(MEMO_LINKS)
    .filter(([memoId, weekId]) => isWeekDone(weekId) && !isDone(memoId))
    .length;

  const badge = document.getElementById('memoAlertBadge');
  if (badge) {
    badge.textContent = count > 0 ? count : '';
    badge.classList.toggle('show', count > 0);
  }
  return count;
}

// ══════════════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════════════
function toggleWk(id) {
  document.getElementById('wk-'+id).classList.toggle('open');
}

function toggleVol(id) {
  document.getElementById('vacc-'+id).classList.toggle('open');
}

function taskClick(tid, wid) {
  const newVal = !isDone(tid);
  setDone(tid, newVal);

  // Update step visuel
  const row = document.getElementById('ts-'+tid);
  if (row) {
    row.classList.toggle('done', newVal);
    const num = document.getElementById('sn-'+tid);
    if (num) {
      num.textContent = newVal ? '✓' : num.dataset.num;
      num.classList.toggle('done', newVal);
      num.classList.add('popping');
      setTimeout(() => num.classList.remove('popping'), 300);
    }
  }

  updateWeekUI(wid);
  updateGlobalProg();

  // Mettre à jour la page Volumes si elle est active
  const active = document.querySelector('.tab-page.active');
  if (active && active.id === 'page-volumes') renderVolumes();

  // Rafraîchir les badges "portfolio OK" des tâches mémoire liées à cette semaine
  (weekToMemoTasks[wid] || []).forEach(memoId => {
    const phase = MEMO_PHASES.find(p => p.tasks.some(t => t.id === memoId));
    if (phase) updateMemoPhaseUI(phase.id);
  });
  calcMemoAlertCount();
}

function memoBadgeHtml(weekEntryId) {
  const linked = WEEK_MEMO_LINKS[weekEntryId] || [];
  if (!linked.length) return '';
  const allDone = linked.every(id => isDone(id));
  return allDone
    ? `<span class="badge b-memo-done" id="memob-${weekEntryId}">MÉMO ✓</span>`
    : `<span class="badge b-memo-linked" id="memob-${weekEntryId}">MÉMO →</span>`;
}

function updateWeekMemoBadge(weekEntryId) {
  if (!WEEK_MEMO_LINKS[weekEntryId]) return;
  const badges = document.getElementById('wkb-' + weekEntryId);
  if (!badges) return;
  const existing = document.getElementById('memob-' + weekEntryId);
  if (existing) existing.remove();
  badges.insertAdjacentHTML('beforeend', memoBadgeHtml(weekEntryId));
}

function updateWeekUI(wid) {
  const e = PLANNING.find(x => x.id === wid);
  if (!e || !e.tasks) return;
  const total = e.tasks.length;
  const done  = e.tasks.filter(t => isDone(t.id)).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  const isAll = done === total;

  const card  = document.getElementById('wk-'+wid);
  const cfg   = document.getElementById('cfg-'+wid);
  const cnum  = document.getElementById('cnum-'+wid);
  const wpb   = document.getElementById('wpb-'+wid);
  const wpf   = document.getElementById('wpf-'+wid);
  const wpp   = document.getElementById('wpp-'+wid);
  const wpc   = document.getElementById('wpc-'+wid);
  const wnf   = document.getElementById('wnf-'+wid);
  const wtf   = document.getElementById('wtf-'+wid);

  if (cfg)  cfg.setAttribute('stroke-dashoffset', circOffset(pct));
  if (cnum) cnum.textContent = isAll ? '✓' : pct+'%';
  if (wpb)  wpb.style.width = pct+'%';
  if (wpf)  wpf.style.width = pct+'%';
  if (wpp)  wpp.textContent = pct+'%';
  if (wpc)  wpc.textContent = `${done} / ${total} tâches`;
  if (wnf)  wnf.style.width = pct+'%';
  if (wtf)  wtf.style.width = pct+'%';
  if (card) card.classList.toggle('done-all', isAll);
}

function updateGlobalProg() {
  const all  = PLANNING.filter(e => e.tasks).flatMap(e => e.tasks);
  const done = all.filter(t => isDone(t.id)).length;
  const pct  = all.length ? Math.round(done/all.length*100) : 0;

  // Pages réelles calculées depuis les volumes (cohérent avec l'onglet Volumes)
  let doneP = 0, totalP = 0;
  VOLUMES.forEach(v => {
    const { done: vd } = calcVolDonePages(v.id);
    doneP += vd;
    totalP += v.pages;
  });

  const fill = document.getElementById('gFill');
  const gpct = document.getElementById('gPct');
  const glbl = document.getElementById('gLabel');
  const plbl = document.getElementById('pLabel');
  if (fill) fill.style.width = pct+'%';
  if (gpct) gpct.textContent = pct+'%';
  if (glbl) glbl.textContent = `${done} / ${all.length} tâches`;
  if (plbl) plbl.textContent = `${doneP}p / ${totalP}p`;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  const btn = document.querySelector(`.bnav-btn[data-tab="${tab}"]`);
  if (btn) btn.classList.add('active');

  const sliderPositions = { planning: '4px', volumes: 'calc(33.333%)', memoire: 'calc(66.666%)' };
  const slider = document.getElementById('bnavSlider');
  if (slider) slider.style.left = sliderPositions[tab];

  const title = document.querySelector('.hdr-title');
  if (title) {
    title.textContent = tab === 'memoire' ? 'MÉMOIRE' : 'PORTFOLIO';
    title.style.color = tab === 'memoire' ? '#E09820' : 'var(--tx2)';
  }

  const heroMemo = document.getElementById('hdrHeroMemo');
  if (heroMemo) heroMemo.style.display = tab === 'volumes' ? 'none' : 'block';

  if (tab === 'volumes') renderVolumes();
  if (tab === 'memoire') {
    if (!document.getElementById('memoCont').children.length) renderMemoire();
    updateMemoGlobalProg();
  }
}
